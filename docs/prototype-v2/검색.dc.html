<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  a { color: #FF9F43; text-decoration: none; }
  a:hover { color: #ffb066; }
  @keyframes gk-fadeup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes gk-float {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(12px,-16px); }
    50%  { transform: translate(-10px,10px); }
    75%  { transform: translate(7px,14px); }
    100% { transform: translate(0,0); }
  }
  .gk-anim { opacity: 0; animation: gk-fadeup 460ms cubic-bezier(0.4,0,0.2,1) forwards; }
  .gk-view { animation: gk-fadeup 380ms cubic-bezier(0.4,0,0.2,1); }
</style>
</helmet>
<div style="position: relative; min-height: 100vh; width: 100%; background: #0D0C0B; font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; overflow-x: hidden;">

  <div style="position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: filter 700ms cubic-bezier(0.4,0,0.2,1); filter: blur({{ dotBlur }}px);">{{ dots }}</div>

  <header style="position: relative; z-index: 2; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid #292724; background: rgba(13,12,11,0.72); backdrop-filter: blur(8px);">
    <span style="color: #625E58; font-size: 12px; font-weight: 400; letter-spacing: 0.18em;">골목결</span>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span style="color: #98938A; font-size: 13px; font-weight: 400; letter-spacing: -0.01em;">{{ dongLabel }}</span>
      <button onClick="{{ changeDong }}" style="height: 28px; padding: 0 12px; background: transparent; border: 1px solid #292724; border-radius: 8px; color: #98938A; font-family: inherit; font-size: 13px; font-weight: 400; cursor: pointer; transition: all 150ms cubic-bezier(0.4,0,0.2,1);" style-hover="background: #1F1E1C; border-color: #3A3733; color: #EDEAE4;" style-active="transform: scale(0.98);">바꾸기</button>
    </div>
  </header>

  <div style="position: relative; z-index: 1; display: flex; justify-content: center;">

    <sc-if value="{{ isSearch }}" hint-placeholder-val="{{ true }}">
      <div class="gk-view" style="width: 100%; max-width: 640px; padding: 120px 24px 96px; display: flex; flex-direction: column;">
        <h1 class="gk-anim" style="animation-delay: 0ms; margin: 0; color: #EDEAE4; font-size: 32px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.3;">오늘은 어떤 자리에<br />앉고 싶어요?</h1>
        <p class="gk-anim" style="animation-delay: 80ms; margin: 20px 0 0; color: #98938A; font-size: 15px; font-weight: 400; line-height: 1.7; letter-spacing: -0.01em;">편하게 말해보세요.<br />골목이 다시 그려질 거예요.</p>

        <form onSubmit="{{ submit }}" class="gk-anim" style="animation-delay: 160ms; margin-top: 40px;">
          <div style="display: flex; align-items: center; gap: 12px; height: 56px; padding: 0 12px 0 20px; background: #161514; border: 1px solid {{ inputBorder }}; border-radius: 999px; transition: border-color 150ms cubic-bezier(0.4,0,0.2,1);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#625E58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
            <input value="{{ query }}" onChange="{{ onInput }}" onFocus="{{ onFocus }}" onBlur="{{ onBlur }}" placeholder="혼자 조용히 밥 먹고 싶어" style="flex: 1; height: 100%; background: transparent; border: none; outline: none; color: #EDEAE4; font-family: inherit; font-size: 15px; font-weight: 400; letter-spacing: -0.01em;" />
            <button type="submit" aria-label="찾기" style="flex: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: {{ submitBg }}; border: none; border-radius: 999px; cursor: pointer; transition: all 150ms cubic-bezier(0.4,0,0.2,1);" style-active="transform: scale(0.96);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ submitStroke }}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </button>
          </div>
        </form>

        <div class="gk-anim" style="animation-delay: 240ms; margin-top: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
          <sc-for list="{{ examples }}" as="ex" hint-placeholder-count="4">
            <button onClick="{{ ex.pick }}" style="height: 48px; display: flex; align-items: center; padding: 0 18px; background: #161514; border: 1px solid #292724; border-radius: 8px; color: #98938A; font-family: inherit; font-size: 14px; font-weight: 400; letter-spacing: -0.01em; cursor: pointer; text-align: left; transition: all 150ms cubic-bezier(0.4,0,0.2,1);" style-hover="background: #1F1E1C; border-color: #3A3733; color: #EDEAE4;" style-active="transform: scale(0.98);">{{ ex.label }}</button>
          </sc-for>
        </div>

        <div class="gk-anim" style="animation-delay: 320ms; margin-top: 56px;">
          <button onClick="{{ playDemo }}" style="width: 100%; aspect-ratio: 16/9; position: relative; display: flex; align-items: center; justify-content: center; background: #131211; border: 1px solid #292724; border-radius: 12px; cursor: pointer; overflow: hidden; transition: all 150ms cubic-bezier(0.4,0,0.2,1);" style-hover="border-color: #3A3733; background: #161514;">
            <span style="width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; background: #1F1E1C; border: 1px solid #3A3733; border-radius: 999px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#EDEAE4" stroke="none"><path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11-6.86a1 1 0 0 0 0-1.72l-11-6.86A1 1 0 0 0 8 5.14z"></path></svg>
            </span>
          </button>
          <div style="margin-top: 12px; text-align: center; color: #625E58; font-size: 12px; font-weight: 400; letter-spacing: 0.01em;">이렇게 쓰는 거예요</div>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isReask }}" hint-placeholder-val="{{ false }}">
      <div class="gk-view" style="width: 100%; max-width: 640px; padding: 96px 24px; display: flex; flex-direction: column;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#625E58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M9 14 4 9l5-5"></path><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5 5.5 5.5 0 0 1-5.5 5.5H11"></path></svg>
          <span style="color: #98938A; font-size: 20px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.4;">{{ reask.queryLabel }}</span>
        </div>

        <div style="margin-top: 24px; height: 1px; background: #292724;"></div>

        <h2 style="margin: 32px 0 0; color: #EDEAE4; font-size: 28px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.35; white-space: pre-line;">{{ reask.headline }}</h2>
        <p style="margin: 20px 0 0; color: #98938A; font-size: 15px; font-weight: 400; line-height: 1.7; letter-spacing: -0.01em; white-space: pre-line;">{{ reask.sub }}</p>

        <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
          <sc-for list="{{ reask.cards }}" as="c" hint-placeholder-count="6">
            <button onClick="{{ c.pick }}" style="{{ c.style }}" style-hover="{{ c.hover }}" style-active="transform: scale(0.98);">{{ c.label }}</button>
          </sc-for>
        </div>

        <div style="margin-top: 32px; color: #625E58; font-size: 13px; font-weight: 400; line-height: 1.5;">또는 직접 말해보세요</div>
        <form onSubmit="{{ submit }}" style="margin-top: 12px;">
          <div style="display: flex; align-items: center; gap: 12px; height: 52px; padding: 0 20px; background: #161514; border: 1px solid {{ inputBorder }}; border-radius: 999px; transition: border-color 150ms cubic-bezier(0.4,0,0.2,1);">
            <input value="{{ query }}" onChange="{{ onInput }}" onFocus="{{ onFocus }}" onBlur="{{ onBlur }}" placeholder="{{ reask.inputPlaceholder }}" style="flex: 1; height: 100%; background: transparent; border: none; outline: none; color: #EDEAE4; font-family: inherit; font-size: 15px; font-weight: 400; letter-spacing: -0.01em;" />
          </div>
        </form>

        <sc-if value="{{ reask.showAll }}" hint-placeholder-val="{{ false }}">
          <div style="margin-top: 32px;">
            <div style="height: 1px; background: #292724;"></div>
            <button onClick="{{ back }}" style="margin-top: 24px; width: 100%; height: 48px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; border-radius: 8px; color: #625E58; font-family: inherit; font-size: 14px; font-weight: 400; letter-spacing: -0.01em; cursor: pointer; transition: color 150ms cubic-bezier(0.4,0,0.2,1);" style-hover="color: #98938A;" style-active="transform: scale(0.99);">{{ reask.showAllLabel }}</button>
          </div>
        </sc-if>
      </div>
    </sc-if>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: "", focused: false, view: "search", reask: null };

  componentDidMount() {
    const colors = ["#A99BF7", "#F5946E", "#63D5AA", "#F28FB4"];
    const rnd = (a, b) => a + Math.random() * (b - a);
    this._dots = Array.from({ length: 187 }, (_, i) => ({
      key: i, left: rnd(-3, 103), top: rnd(-3, 103),
      size: rnd(5, 13), color: colors[i % 4],
      dur: rnd(18, 30), delay: rnd(-24, 0),
    }));
    this.forceUpdate();
  }

  goMap(q) {
    if (this.props.onGoMap) this.props.onGoMap(q);
    else this.route(q);
  }

  route(raw) {
    const q = (raw || "").trim();
    if (!q) return;
    const cuisines = ["닭갈비","삼겹살","국밥","파스타","초밥","냉면","피자","치킨","쌀국수","곱창","김밥","라멘","돈까스","막창","갈비","보쌈"];
    const generic = ["맛집","추천","근처","유명","인기","베스트","best"];
    const hit = cuisines.find((c) => q.includes(c));
    if (hit) { this.setState({ view: "reask", reask: this.cuisineReask(q, hit) }); return; }
    if (generic.some((g) => q.toLowerCase().includes(g.toLowerCase()))) {
      this.setState({ view: "reask", reask: this.genericReask(q) }); return;
    }
    // taste query → go straight to the taste map
    if (this.props.onGoMap) { this.props.onGoMap(q); return; }
    this.setState({ view: "reask", reask: this.genericReask(q) });
  }

  genericReask(q) {
    return {
      type: "generic",
      queryLabel: q,
      headline: "맛있는 집은\n네이버가 더 잘 알아요.",
      sub: "저희는 다른 걸 알려드릴게요.\n어떤 자리를 원하세요?",
      inputPlaceholder: "예: 비 오는 날 혼자 앉기 좋은 곳",
      showAll: false,
      cards: ["혼자 조용히","친구랑 수다","후딱 한 끼","오래 앉아있기","가성비 좋게","특별한 날"],
    };
  }

  cuisineReask(q, cuisine) {
    return {
      type: "cuisine",
      queryLabel: q,
      headline: `${this.props.dong ? this.props.dong.name : "은행동"}에 ${cuisine}집이\n8곳 있어요.`,
      sub: "그런데 다 다른 집이에요.\n어떤 자리를 찾으세요?",
      inputPlaceholder: `예: "회식용 ${cuisine}집"`,
      showAll: true,
      showAllLabel: "8곳 그냥 다 보기",
      cards: ["혼자 조용히","여럿이 왁자지껄","가성비 좋게","분위기 있게"],
    };
  }

  renderVals() {
    const quad = ["#A99BF7", "#F5946E", "#63D5AA", "#F28FB4"];
    const view = this.state.view;
    const rk = this.state.reask;

    const dots = (this._dots || []).map((d) =>
      React.createElement("div", {
        key: d.key,
        style: {
          position: "absolute", left: d.left + "%", top: d.top + "%",
          width: d.size + "px", height: d.size + "px", borderRadius: "999px",
          background: d.color, opacity: 0.1,
          animation: `gk-float ${d.dur}s ease-in-out ${d.delay}s infinite`,
        },
      })
    );

    let reask = null;
    if (rk) {
      reask = {
        queryLabel: `"${rk.queryLabel}"`,
        headline: rk.headline,
        sub: rk.sub,
        inputPlaceholder: rk.inputPlaceholder,
        showAll: rk.showAll,
        showAllLabel: rk.showAllLabel,
        cards: rk.cards.map((label, i) => {
          const color = quad[i % 4];
          return {
            label,
            pick: () => this.goMap(label),
            style: {
              height: "96px", display: "flex", alignItems: "center",
              justifyContent: "center", padding: "0 16px",
              background: "#161514", border: "1px solid #292724",
              borderRadius: "12px", cursor: "pointer",
              color: "#EDEAE4", fontFamily: "inherit", fontSize: "15px",
              fontWeight: 500, letterSpacing: "-0.01em", textAlign: "center",
              transition: "all 150ms cubic-bezier(0.4,0,0.2,1)",
            },
            hover: `background: #1F1E1C; border-color: ${color}; color: ${color};`,
          };
        }),
      };
    }

    const isSearch = view === "search";
    const focused = this.state.focused;
    const hasQuery = this.state.query.trim().length > 0;

    return {
      dots,
      dotBlur: focused || !isSearch ? 5 : 14,
      isSearch,
      isReask: view === "reask",
      reask,
      query: this.state.query,
      onInput: (e) => this.setState({ query: e.target.value }),
      onFocus: () => this.setState({ focused: true }),
      onBlur: () => this.setState({ focused: false }),
      inputBorder: focused ? "#FF9F43" : "#292724",
      submit: (e) => { e.preventDefault(); this.route(this.state.query); },
      submitBg: hasQuery ? "#FF9F43" : "#1F1E1C",
      submitStroke: hasQuery ? "#0D0C0B" : "#625E58",
      examples: ["혼자 조용히","친구랑 수다","후딱 한 끼","오래 앉아있기"].map((label) => ({
        label,
        pick: () => this.goMap(label),
      })),
      playDemo: () => {},
      dongLabel: `${this.props.dong ? this.props.dong.name : "은행동"} · 식당 ${this.props.dong ? this.props.dong.count : 187}곳`,
      changeDong: () => { if (this.props.onBack) this.props.onBack(); else this.setState({ view: "search", reask: null, query: "" }); },
      back: () => this.setState({ view: "search", reask: null, query: "" }),
    };
  }
}
</script>
</body>
</html>
